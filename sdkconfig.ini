# TickerTouch sdkconfig overrides for Arduino-ESP32 Core 3.x
#
# IMPORTANT: This file only works with Arduino-ESP32 Core 3.0.0 or later.
#
# PURPOSE: Route mbedTLS (TLS/HTTPS) memory allocations to 8MB PSRAM.
# WITHOUT this, every HTTPS call fails because the 45KB+ TLS handshake
# buffers exhaust internal SRAM alongside WiFi and application stacks.
#
# CRITICAL: Do NOT enable CONFIG_SPIRAM_USE_MALLOC here. That makes the
# default malloc() use PSRAM, which causes Arduino String objects to
# allocate there. PSRAM has cache alignment constraints that crash the
# CPU (LoadProhibited) when String does internal copy/move operations.
# Only mbedTLS should use PSRAM — everything else stays in internal SRAM.

[env]
# Route ALL mbedTLS allocations to external SPIRAM
CONFIG_MBEDTLS_EXTERNAL_MEM_ALLOC=y
CONFIG_MBEDTLS_INTERNAL_MEM_ALLOC=n
CONFIG_MBEDTLS_DEFAULT_MEM_ALLOC=n

# Reduce TLS record buffers — 8KB in + 4KB out is enough for all our APIs
CONFIG_MBEDTLS_SSL_IN_CONTENT_LEN=8192
CONFIG_MBEDTLS_SSL_OUT_CONTENT_LEN=4096

# Don't keep peer certificate after handshake (saves ~4KB per connection)
CONFIG_MBEDTLS_SSL_KEEP_PEER_CERTIFICATE=n

# DO NOT set CONFIG_SPIRAM_USE_MALLOC=y — keep malloc() in internal SRAM
